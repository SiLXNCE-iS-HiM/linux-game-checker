<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Linux Game Checker</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root[data-theme="dark"] {
      --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
      --text: #e8e8e8; --muted: #888; --accent: #7c6aff;
      --native: #22c55e; --proton: #3b82f6; --blocked: #ef4444; --cloud: #f59e0b;
      --card-note: #666; --toggle-bg: #2a2a2a;
    }
    :root[data-theme="light"] {
      --bg: #f5f5f0; --surface: #ffffff; --border: #e0e0e0;
      --text: #111111; --muted: #777; --accent: #5b4de0;
      --native: #16a34a; --proton: #2563eb; --blocked: #dc2626; --cloud: #d97706;
      --card-note: #999; --toggle-bg: #e0e0e0;
    }

    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 2rem 1rem; transition: background 0.2s, color 0.2s; }
    .container { max-width: 960px; margin: 0 auto; }

    header { margin-bottom: 2.5rem; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
    .header-left h1 { font-family: 'JetBrains Mono', monospace; font-size: 2rem; font-weight: 500; margin-bottom: 0.4rem; }
    .header-left h1 span { color: var(--accent); }
    .header-left p { color: var(--muted); font-size: 0.95rem; }

    .toggle-btn { background: var(--toggle-bg); border: 1px solid var(--border); border-radius: 99px; padding: 6px 14px; cursor: pointer; font-size: 13px; color: var(--text); font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 6px; transition: all 0.15s; white-space: nowrap; }
    .toggle-btn:hover { border-color: var(--accent); }

    .search-row { display: flex; gap: 10px; margin-bottom: 1.25rem; }
    .search-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 16px; color: var(--text); font-size: 15px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
    .search-row input:focus { border-color: var(--accent); }
    .search-row input::placeholder { color: var(--muted); }

    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.75rem; }
    .filter-btn { padding: 6px 16px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
    .filter-btn:hover { border-color: var(--muted); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.75rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; }
    .stat-num { font-size: 1.6rem; font-weight: 600; }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .stat-card.native .stat-num { color: var(--native); }
    .stat-card.proton .stat-num { color: var(--proton); }
    .stat-card.cloud .stat-num { color: var(--cloud); }
    .stat-card.blocked .stat-num { color: var(--blocked); }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 10px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; transition: border-color 0.15s; }
    .card:hover { border-color: var(--muted); }

    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; gap: 8px; }
    .card-name { font-size: 15px; font-weight: 500; color: var(--text); }

    .badges { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; flex-shrink: 0; }
    .badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 99px; white-space: nowrap; }
    .badge.native { background: rgba(34,197,94,0.15); color: var(--native); }
    .badge.proton { background: rgba(59,130,246,0.15); color: var(--proton); }
    .badge.blocked { background: rgba(239,68,68,0.15); color: var(--blocked); }
    .badge.cloud { background: rgba(245,158,11,0.15); color: var(--cloud); }
    .badge.platinum { background: rgba(168,85,247,0.15); color: #a855f7; }
    .badge.gold { background: rgba(234,179,8,0.15); color: #ca8a04; }
    .badge.silver { background: rgba(148,163,184,0.15); color: #94a3b8; }

    .card-genre { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .card-note { font-size: 12px; color: var(--card-note); }

    .empty { text-align: center; padding: 4rem; color: var(--muted); font-size: 14px; grid-column: 1/-1; }

    footer { margin-top: 3rem; text-align: center; color: var(--muted); font-size: 12px; }
    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 500px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .header-left h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-left">
      <h1>Linux <span>Game</span> Checker</h1>
      <p>Find out if your favourite games run on Linux — native, via Proton, or cloud only.</p>
    </div>
    <button class="toggle-btn" onclick="toggleTheme()" id="theme-btn">☀️ Light mode</button>
  </header>

  <div class="search-row">
    <input type="text" id="search" placeholder="Search by game name or genre..." oninput="render()" />
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('native',this)">Native</button>
    <button class="filter-btn" onclick="setFilter('proton',this)">Via Proton</button>
    <button class="filter-btn" onclick="setFilter('cloud',this)">Cloud only</button>
    <button class="filter-btn" onclick="setFilter('blocked',this)">Blocked</button>
  </div>

  <div class="stats">
    <div class="stat-card native"><div class="stat-num" id="s-native">0</div><div class="stat-label">Native</div></div>
    <div class="stat-card proton"><div class="stat-num" id="s-proton">0</div><div class="stat-label">Via Proton</div></div>
    <div class="stat-card cloud"><div class="stat-num" id="s-cloud">0</div><div class="stat-label">Cloud only</div></div>
    <div class="stat-card blocked"><div class="stat-num" id="s-blocked">0</div><div class="stat-label">Blocked</div></div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    <p>Built by <a href="https://github.com/SiLXNCE-iS-HiM" target="_blank">SiLXNCE-iS-HiM</a> &mdash; data sourced from <a href="https://www.protondb.com" target="_blank">ProtonDB</a></p>
  </footer>
</div>

  let filter = 'all';

  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('theme-btn').textContent = isDark ? '🌙 Dark mode' : '☀️ Light mode';
  }

  function setFilter(f, el) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function render() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = games.filter(g => {
      const matchQ = g.name.toLowerCase().includes(q) || g.genre.toLowerCase().includes(q);
      const matchF = filter === 'all' || g.type === filter;
      return matchQ && matchF;
    });

    const counts = {native:0,proton:0,blocked:0,cloud:0};
    games.forEach(g => counts[g.type]++);
    document.getElementById('s-native').textContent = counts.native;
    document.getElementById('s-proton').textContent = counts.proton;
    document.getElementById('s-cloud').textContent = counts.cloud;
    document.getElementById('s-blocked').textContent = counts.blocked;

    const labels = {native:'Native',proton:'Via Proton',blocked:'Blocked',cloud:'Cloud only'};

    if (!filtered.length) {
      document.getElementById('grid').innerHTML = '<div class="empty">No games found — try searching something else</div>';
      return;
    }

    document.getElementById('grid').innerHTML = filtered.map(g => `
      <div class="card">
        <div class="card-top">
          <div class="card-name">${g.name}</div>
          <div class="badges">
            <span class="badge ${g.type}">${labels[g.type]}</span>

          </div>
        </div>
        <div class="card-genre">${g.genre}</div>
        <div class="card-note">${g.note}</div>
      </div>
    `).join('');
  }
