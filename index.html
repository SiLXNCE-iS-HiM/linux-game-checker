<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Linux Game Checker</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #7c6aff;
      --native: #22c55e;
      --proton: #3b82f6;
      --blocked: #ef4444;
      --cloud: #f59e0b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 960px; margin: 0 auto; }

    header { margin-bottom: 2.5rem; }
    header h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.4rem;
    }
    header h1 span { color: var(--accent); }
    header p { color: var(--muted); font-size: 0.95rem; }

    .search-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1.25rem;
    }
    .search-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px;
      color: var(--text);
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-row input:focus { border-color: var(--accent); }
    .search-row input::placeholder { color: var(--muted); }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 1.75rem;
    }
    .filter-btn {
      padding: 6px 16px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: #444; color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 1.75rem;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .stat-num { font-size: 1.6rem; font-weight: 600; }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .stat-card.native .stat-num { color: var(--native); }
    .stat-card.proton .stat-num { color: var(--proton); }
    .stat-card.cloud .stat-num { color: var(--cloud); }
    .stat-card.blocked .stat-num { color: var(--blocked); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 10px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      transition: border-color 0.15s;
    }
    .card:hover { border-color: #444; }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
      gap: 8px;
    }
    .card-name { font-size: 15px; font-weight: 500; color: var(--text); }
    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 99px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge.native { background: rgba(34,197,94,0.15); color: var(--native); }
    .badge.proton { background: rgba(59,130,246,0.15); color: var(--proton); }
    .badge.blocked { background: rgba(239,68,68,0.15); color: var(--blocked); }
    .badge.cloud { background: rgba(245,158,11,0.15); color: var(--cloud); }

    .card-genre { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .card-note { font-size: 12px; color: #666; }

    .empty {
      text-align: center;
      padding: 4rem;
      color: var(--muted);
      font-size: 14px;
      grid-column: 1/-1;
    }

    footer {
      margin-top: 3rem;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }
    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 500px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Linux <span>Game</span> Checker</h1>
    <p>Find out if your favourite games run on Linux — native, via Proton, or cloud only.</p>
  </header>

  <div class="search-row">
    <input type="text" id="search" placeholder="Search by game name or genre..." oninput="render()" />
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('native',this)">Native</button>
    <button class="filter-btn" onclick="setFilter('proton',this)">Via Proton</button>
    <button class="filter-btn" onclick="setFilter('cloud',this)">Cloud only</button>
    <button class="filter-btn" onclick="setFilter('blocked',this)">Blocked</button>
  </div>

  <div class="stats">
    <div class="stat-card native"><div class="stat-num" id="s-native">0</div><div class="stat-label">Native</div></div>
    <div class="stat-card proton"><div class="stat-num" id="s-proton">0</div><div class="stat-label">Via Proton</div></div>
    <div class="stat-card cloud"><div class="stat-num" id="s-cloud">0</div><div class="stat-label">Cloud only</div></div>
    <div class="stat-card blocked"><div class="stat-num" id="s-blocked">0</div><div class="stat-label">Blocked</div></div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    <p>Built by <a href="https://github.com/SiLXNCE-iS-HiM" target="_blank">SiLXNCE-iS-HiM</a> &mdash; data sourced from <a href="https://www.protondb.com" target="_blank">ProtonDB</a></p>
  </footer>
</div>

<script>
  const games = [
    {name:"Baldur's Gate 3",type:"native",genre:"RPG",note:"Official Linux support — runs perfectly"},
{name:"Hades 2",type:"native",genre:"Roguelike",note:"Official Linux support"},
{name:"Palworld",type:"proton",genre:"Survival",note:"Gold rated on ProtonDB"},
{name:"No Man's Sky",type:"proton",genre:"Survival",note:"Platinum rated on ProtonDB"},
{name:"Satisfactory",type:"proton",genre:"Strategy",note:"Gold rated on ProtonDB"},
{name:"Dave the Diver",type:"proton",genre:"Adventure",note:"Gold rated on ProtonDB"},
{name:"The Finals",type:"blocked",genre:"FPS",note:"Anti-cheat blocks Linux"},
{name:"Call of Duty Warzone",type:"blocked",genre:"FPS",note:"Anti-cheat blocks Linux"},
{name:"Minecraft Bedrock",type:"blocked",genre:"Sandbox",note:"No Linux support — use Java Edition"},
{name:"Halo Infinite",type:"cloud",genre:"FPS",note:"Play via Xbox Cloud Gaming"},
{name:"Sea of Thieves",type:"cloud",genre:"Adventure",note:"Play via Xbox Cloud Gaming"},
{name:"Battlefield 2042",type:"cloud",genre:"FPS",note:"Play via Xbox Cloud Gaming"},
{name:"Starfield",type:"proton",genre:"RPG",note:"Gold rated on ProtonDB"},
{name:"Doom Eternal",type:"proton",genre:"FPS",note:"Platinum rated on ProtonDB"},
{name:"Control",type:"proton",genre:"Action",note:"Gold rated on ProtonDB"},
{name:"Ori and the Will of the Wisps",type:"proton",genre:"Platformer",note:"Gold rated on ProtonDB"},
{name:"Spiritfarer",type:"native",genre:"Sim",note:"Official Linux support"},
{name:"Slay the Spire",type:"native",genre:"Roguelike",note:"Official Linux support"},
{name:"Vampire Survivors",type:"native",genre:"Roguelike",note:"Official Linux support"},
{name:"Lethal Company",type:"proton",genre:"Co-op",note:"Gold rated on ProtonDB"},
    {name:"Portal 2",type:"native",genre:"Puzzle",note:"Fully native Linux support"},
    {name:"Left 4 Dead 2",type:"native",genre:"Co-op",note:"Fully native Linux support"},
    {name:"Garry's Mod",type:"native",genre:"Sandbox",note:"Fully native Linux support"},
    {name:"Euro Truck Simulator 2",type:"native",genre:"Sim",note:"Official Linux support"},
    {name:"Celeste",type:"native",genre:"Platformer",note:"Platinum rated on ProtonDB"},
    {name:"Dead Cells",type:"native",genre:"Roguelike",note:"Official Linux support"},
    {name:"Risk of Rain 2",type:"native",genre:"Roguelike",note:"Official Linux support"},
    {name:"Rust",type:"native",genre:"Survival",note:"Official Linux support"},
    {name:"Factorio",type:"native",genre:"Strategy",note:"Official Linux support"},
    {name:"Subnautica",type:"proton",genre:"Survival",note:"Gold rated on ProtonDB"},
    {name:"The Witcher 3",type:"proton",genre:"RPG",note:"Platinum rated on ProtonDB"},
    {name:"Dark Souls 3",type:"proton",genre:"RPG",note:"Gold rated on ProtonDB"},
    {name:"Sekiro",type:"proton",genre:"Action",note:"Gold rated on ProtonDB"},
    {name:"Monster Hunter World",type:"proton",genre:"Action",note:"Gold rated on ProtonDB"},
    {name:"Resident Evil 4",type:"proton",genre:"Horror",note:"Platinum rated on ProtonDB"},
    {name:"Death Stranding",type:"proton",genre:"Action",note:"Gold rated on ProtonDB"},
    {name:"Battlefield 2042",type:"cloud",genre:"FPS",note:"Play via Xbox Cloud Gaming"},
    {name:"Halo Infinite",type:"cloud",genre:"FPS",note:"Play via Xbox Cloud Gaming"},
    {name:"Sea of Thieves",type:"cloud",genre:"Adventure",note:"Play via Xbox Cloud Gaming"},
    {name:"It Takes Two",type:"cloud",genre:"Co-op",note:"Play via Xbox Cloud Gaming"},
    {name:"Splitgate",type:"blocked",genre:"FPS",note:"Anti-cheat blocks Linux"},
    {name:"PUBG",type:"proton",genre:"Battle Royale",note:"Gold rated on ProtonDB"},
    {name:"CS2",type:"native",genre:"FPS",note:"Runs perfectly via Steam on Linux"},
    {name:"Dota 2",type:"native",genre:"MOBA",note:"Fully native Linux support"},
    {name:"Team Fortress 2",type:"native",genre:"FPS",note:"Fully native Linux support"},
    {name:"Minecraft Java",type:"native",genre:"Sandbox",note:"Java runs natively everywhere"},
    {name:"Stardew Valley",type:"native",genre:"Sim",note:"Official Linux support"},
    {name:"Terraria",type:"native",genre:"Sandbox",note:"Platinum rated on ProtonDB"},
    {name:"Among Us",type:"native",genre:"Party",note:"Platinum rated on ProtonDB"},
    {name:"Hollow Knight",type:"native",genre:"Platformer",note:"Platinum rated on ProtonDB"},
    {name:"Hades",type:"native",genre:"Roguelike",note:"Platinum rated on ProtonDB"},
    {name:"Rocket League",type:"native",genre:"Sports",note:"Fully native Linux support"},
    {name:"GTA V",type:"proton",genre:"Action",note:"Runs great via Proton on Steam"},
    {name:"Red Dead Redemption 2",type:"proton",genre:"Action",note:"Gold rated on ProtonDB"},
    {name:"Cyberpunk 2077",type:"proton",genre:"RPG",note:"Gold rated on ProtonDB"},
    {name:"Elden Ring",type:"proton",genre:"RPG",note:"Gold rated on ProtonDB"},
    {name:"Cuphead",type:"proton",genre:"Platformer",note:"Platinum rated on ProtonDB"},
    {name:"Deep Rock Galactic",type:"proton",genre:"Co-op",note:"Platinum rated on ProtonDB"},
    {name:"Fallout 4",type:"proton",genre:"RPG",note:"Gold rated on ProtonDB"},
    {name:"Skyrim",type:"proton",genre:"RPG",note:"Platinum rated on ProtonDB"},
    {name:"Fortnite",type:"blocked",genre:"Battle Royale",note:"EasyAntiCheat blocks Linux"},
    {name:"Valorant",type:"blocked",genre:"FPS",note:"Vanguard anti-cheat blocks Linux"},
    {name:"Roblox",type:"blocked",genre:"Sandbox",note:"No official Linux support"},
    {name:"Overwatch 2",type:"blocked",genre:"FPS",note:"Anti-cheat blocks Linux"},
    {name:"Apex Legends",type:"cloud",genre:"Battle Royale",note:"Play via Xbox Cloud Gaming"},
    {name:"Black Ops 7",type:"cloud",genre:"FPS",note:"Play via Xbox Cloud Gaming"},
    {name:"FC 26",type:"cloud",genre:"Sports",note:"Play via Xbox Cloud Gaming"},
    {name:"Rainbow Six Siege",type:"cloud",genre:"FPS",note:"Play via Xbox Cloud Gaming"},
  ];

  let filter = 'all';

  function setFilter(f, el) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function render() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = games.filter(g => {
      const matchQ = g.name.toLowerCase().includes(q) || g.genre.toLowerCase().includes(q);
      const matchF = filter === 'all' || g.type === filter;
      return matchQ && matchF;
    });

    const counts = {native:0,proton:0,blocked:0,cloud:0};
    games.forEach(g => counts[g.type]++);
    document.getElementById('s-native').textContent = counts.native;
    document.getElementById('s-proton').textContent = counts.proton;
    document.getElementById('s-cloud').textContent = counts.cloud;
    document.getElementById('s-blocked').textContent = counts.blocked;

    const labels = {native:'Native',proton:'Via Proton',blocked:'Blocked',cloud:'Cloud only'};

    if (!filtered.length) {
      document.getElementById('grid').innerHTML = '<div class="empty">No games found — try searching something else</div>';
      return;
    }

    document.getElementById('grid').innerHTML = filtered.map(g => `
      <div class="card">
        <div class="card-top">
          <div class="card-name">${g.name}</div>
          <span class="badge ${g.type}">${labels[g.type]}</span>
        </div>
        <div class="card-genre">${g.genre}</div>
        <div class="card-note">${g.note}</div>
      </div>
    `).join('');
  }

  render();
</script>
</body>
</html>
