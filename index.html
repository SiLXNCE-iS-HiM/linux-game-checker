<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Linux Game Checker</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root[data-theme="dark"] {
      --bg: #0f0f0f; --surface: #1a1a1a; --border: #2a2a2a;
      --text: #e8e8e8; --muted: #888; --accent: #7c6aff;
      --native: #22c55e; --proton: #3b82f6; --blocked: #ef4444; --cloud: #f59e0b;
      --card-note: #666; --toggle-bg: #2a2a2a;
    }
    :root[data-theme="light"] {
      --bg: #f5f5f0; --surface: #ffffff; --border: #e0e0e0;
      --text: #111111; --muted: #777; --accent: #5b4de0;
      --native: #16a34a; --proton: #2563eb; --blocked: #dc2626; --cloud: #d97706;
      --card-note: #999; --toggle-bg: #e0e0e0;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 2rem 1rem; transition: background 0.2s, color 0.2s; }
    .container { max-width: 960px; margin: 0 auto; }
    header { margin-bottom: 2.5rem; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; }
    .header-left h1 { font-family: 'JetBrains Mono', monospace; font-size: 2rem; font-weight: 500; margin-bottom: 0.4rem; }
    .header-left h1 span { color: var(--accent); }
    .header-left p { color: var(--muted); font-size: 0.95rem; }
    .header-right { display: flex; gap: 8px; flex-wrap: wrap; }
    .toggle-btn { background: var(--toggle-bg); border: 1px solid var(--border); border-radius: 99px; padding: 6px 14px; cursor: pointer; font-size: 13px; color: var(--text); font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 6px; transition: all 0.15s; white-space: nowrap; }
    .toggle-btn:hover { border-color: var(--accent); }
    .search-row { display: flex; gap: 10px; margin-bottom: 1rem; }
    .search-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 16px; color: var(--text); font-size: 15px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.2s; }
    .search-row input:focus { border-color: var(--accent); }
    .search-row input::placeholder { color: var(--muted); }
    .controls-row { display: flex; gap: 10px; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
    select { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; color: var(--text); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; cursor: pointer; transition: border-color 0.2s; }
    select:hover { border-color: var(--accent); }
    .result-count { font-size: 13px; color: var(--muted); margin-left: auto; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.75rem; }
    .filter-btn { padding: 6px 16px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
    .filter-btn:hover { border-color: var(--muted); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.75rem; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; cursor: pointer; transition: border-color 0.15s; }
    .stat-card:hover { border-color: var(--muted); }
    .stat-num { font-size: 1.6rem; font-weight: 600; }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .stat-card.native .stat-num { color: var(--native); }
    .stat-card.proton .stat-num { color: var(--proton); }
    .stat-card.cloud .stat-num { color: var(--cloud); }
    .stat-card.blocked .stat-num { color: var(--blocked); }
    .section-title { font-size: 13px; color: var(--muted); margin-bottom: 10px; font-weight: 500; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 10px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; transition: border-color 0.15s; position: relative; }
    .card:hover { border-color: var(--muted); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; gap: 8px; }
    .card-name { font-size: 15px; font-weight: 500; color: var(--text); }
    .badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
    .badge.native { background: rgba(34,197,94,0.15); color: var(--native); }
    .badge.proton { background: rgba(59,130,246,0.15); color: var(--proton); }
    .badge.blocked { background: rgba(239,68,68,0.15); color: var(--blocked); }
    .badge.cloud { background: rgba(245,158,11,0.15); color: var(--cloud); }
    .card-genre { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
    .card-note { font-size: 12px; color: var(--card-note); }
    .card-actions { display: flex; gap: 6px; margin-top: 10px; }
    .copy-btn { font-size: 11px; padding: 3px 10px; border-radius: 99px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: var(--native); color: var(--native); }
    .empty { text-align: center; padding: 4rem; color: var(--muted); font-size: 14px; grid-column: 1/-1; }
    .recently-section { margin-bottom: 2rem; }
    footer { margin-top: 3rem; text-align: center; color: var(--muted); font-size: 12px; }
    footer a { color: var(--accent); text-decoration: none; }
    @media (max-width: 500px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .header-left h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-left">
      <h1>Linux <span>Game</span> Checker</h1>
      <p>Find out if your favourite games run on Linux — native, via Proton, or cloud only.</p>
    </div>
    <div class="header-right">
      <button class="toggle-btn" onclick="toggleTheme()" id="theme-btn">☀️ Light mode</button>
    </div>
  </header>

  <div class="search-row">
    <input type="text" id="search" placeholder="Search by game name or genre..." oninput="render()" />
  </div>

  <div class="controls-row">
    <select id="genre-filter" onchange="render()">
      <option value="all">All genres</option>
    </select>
    <select id="sort-select" onchange="render()">
      <option value="default">Default order</option>
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
    </select>
    <span class="result-count" id="result-count"></span>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('native',this)">Native</button>
    <button class="filter-btn" onclick="setFilter('proton',this)">Via Proton</button>
    <button class="filter-btn" onclick="setFilter('cloud',this)">Cloud only</button>
    <button class="filter-btn" onclick="setFilter('blocked',this)">Blocked</button>
  </div>

  <div class="stats">
    <div class="stat-card native" onclick="setFilterById('native')"><div class="stat-num" id="s-native">0</div><div class="stat-label">Native</div></div>
    <div class="stat-card proton" onclick="setFilterById('proton')"><div class="stat-num" id="s-proton">0</div><div class="stat-label">Via Proton</div></div>
    <div class="stat-card cloud" onclick="setFilterById('cloud')"><div class="stat-num" id="s-cloud">0</div><div class="stat-label">Cloud only</div></div>
    <div class="stat-card blocked" onclick="setFilterById('blocked')"><div class="stat-num" id="s-blocked">0</div><div class="stat-label">Blocked</div></div>
  </div>

  <div id="recently-section" class="recently-section" style="display:none">
    <div class="section-title">Recently viewed</div>
    <div class="grid" id="recently-grid"></div>
    <br/>
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    <p>Built by <a href="https://github.com/SiLXNCE-iS-HiM" target="_blank">SiLXNCE-iS-HiM</a> &mdash; data sourced from <a href="https://www.protondb.com" target="_blank">ProtonDB</a></p>
  </footer>
</div>

  // Deduplicate by name
  const seen = new Set();
  const uniqueGames = games.filter(g => {
    if (seen.has(g.name.toLowerCase())) return false;
    seen.add(g.name.toLowerCase());
    return true;
  });

  let filter = 'all';
  let recentlyViewed = JSON.parse(localStorage.getItem('lgc_recent') || '[]');

  // Build genre dropdown
  const genres = [...new Set(uniqueGames.map(g => g.genre))].sort();
  const genreSelect = document.getElementById('genre-filter');
  genres.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g; opt.textContent = g;
    genreSelect.appendChild(opt);
  });

  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('theme-btn').textContent = isDark ? '🌙 Dark mode' : '☀️ Light mode';
  }

  function setFilter(f, el) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function setFilterById(f) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.textContent.toLowerCase().includes(f) || (f === 'all' && b.textContent === 'All'));
    });
    render();
  }

  function addRecent(game) {
    recentlyViewed = [game, ...recentlyViewed.filter(g => g.name !== game.name)].slice(0, 6);
    try { localStorage.setItem('lgc_recent', JSON.stringify(recentlyViewed)); } catch(e) {}
    renderRecent();
  }

  function copyGameLink(name, btn) {
    const url = window.location.href.split('?')[0] + '?q=' + encodeURIComponent(name);
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy link'; btn.classList.remove('copied'); }, 2000);
    });
  }

  function cardHTML(g, labels) {
    return `
      <div class="card" onclick="addRecent(${JSON.stringify(g).replace(/"/g,'&quot;')})">
        <div class="card-top">
          <div class="card-name">${g.name}</div>
          <span class="badge ${g.type}">${labels[g.type]}</span>
        </div>
        <div class="card-genre">${g.genre}</div>
        <div class="card-note">${g.note}</div>
        <div class="card-actions">
          <button class="copy-btn" onclick="event.stopPropagation();copyGameLink('${g.name.replace(/'/g,"\\'")}',this)">Copy link</button>
        </div>
      </div>`;
  }

  function renderRecent() {
    const section = document.getElementById('recently-section');
    const grid = document.getElementById('recently-grid');
    if (!recentlyViewed.length) { section.style.display = 'none'; return; }
    section.style.display = 'block';
    const labels = {native:'Native',proton:'Via Proton',blocked:'Blocked',cloud:'Cloud only'};
    grid.innerHTML = recentlyViewed.map(g => cardHTML(g, labels)).join('');
  }

  function render() {
    const q = document.getElementById('search').value.toLowerCase();
    const genreVal = document.getElementById('genre-filter').value;
    const sortVal = document.getElementById('sort-select').value;

    let filtered = uniqueGames.filter(g => {
      const matchQ = g.name.toLowerCase().includes(q) || g.genre.toLowerCase().includes(q);
      const matchF = filter === 'all' || g.type === filter;
      const matchG = genreVal === 'all' || g.genre === genreVal;
      return matchQ && matchF && matchG;
    });

    if (sortVal === 'az') filtered.sort((a,b) => a.name.localeCompare(b.name));
    if (sortVal === 'za') filtered.sort((a,b) => b.name.localeCompare(a.name));

    const counts = {native:0,proton:0,blocked:0,cloud:0};
    uniqueGames.forEach(g => counts[g.type]++);
    document.getElementById('s-native').textContent = counts.native;
    document.getElementById('s-proton').textContent = counts.proton;
    document.getElementById('s-cloud').textContent = counts.cloud;
    document.getElementById('s-blocked').textContent = counts.blocked;
    document.getElementById('result-count').textContent = `${filtered.length} game${filtered.length !== 1 ? 's' : ''} found`;

    const labels = {native:'Native',proton:'Via Proton',blocked:'Blocked',cloud:'Cloud only'};

    if (!filtered.length) {
      document.getElementById('grid').innerHTML = '<div class="empty">No games found — try searching something else</div>';
      return;
    }

    document.getElementById('grid').innerHTML = filtered.map(g => cardHTML(g, labels)).join('');
  }

  // Handle URL query param
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('q')) document.getElementById('search').value = urlParams.get('q');

  renderRecent();
  render();
</script>
